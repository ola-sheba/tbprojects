schema_version = "1.3"

[task]
name = "local/academic-paper-insights-api"
description = "Build a FastAPI service for uploading and analyzing long academic papers in PDF and DOCX format."
authors = [{ name = "ChatGPT", email = "example@example.com" }]
keywords = ["python", "fastapi", "nlp", "pdf", "docx", "long-context"]

[metadata]
category = "software-engineering"
difficulty = "medium"
difficulty_explanation = "Requires building an API, parsing multiple document formats, handling long documents with chunking, returning structured NLP-style analysis, and providing reproducible dependency metadata."

[environment]
os = "linux"
network_mode = "no-network"
build_timeout_sec = 600.0
cpus = 2
memory_mb = 4096
storage_mb = 8192

[agent]
timeout_sec = 900.0

[verifier]
timeout_sec = 300.0
